# =============================================================================
# CAMELS-US LSTM 训练配置文件 - HydroArray
# =============================================================================

# ============== 实验配置 ==============
experiment:
  # 实验名称（用作结果文件夹名称）
  experiment_name: camels_us_lstm

  # 输出目录（实验结果的父文件夹）
  output_dir: ./runs

  # 随机种子（null = 不设置种子）
  seed: 42

  # 设备：'auto', 'cuda', 'cpu', 'cuda:0'
  device: auto

  # 每 N 个 epoch 打印训练日志
  log_interval: 10

# ============== 数据配置 ==============
data:
  # 数据集名称：'camels_us'
  dataset: camels_us

  # CAMELS-US 数据目录路径
  data_dir: M:/CAMEL-US/data/美国数据集 (CAMELS)/美国数据集 (CAMELS)

  # 流域编号（8位数字格式，引号必须以保留前导零）
  basins:
    - "01013500"
    - "01015000"
    - "01022500"

  # 输入序列长度（天）
  seq_len: 365

  # 预测长度（天）
  pred_len: 1

  # 气象驱动变量
  forcings:
    - dayl(s)        # 日照时长
    - prcp(mm/day)   # 降水
    - srad(W/m2)     # 太阳辐射
    - swe(mm)        # 雪水当量
    - tmax(C)        # 最高温度
    - tmin(C)        # 最低温度
    - vp(Pa)         # 蒸气压

  # 气象数据来源：'daymet', 'maurer', 'nldas'
  forcing_source: daymet

  # 数据划分比例（验证集比例）
  val_ratio: 0.1

  # DataLoader 设置
  batch_size: 32
  num_workers: 0
  pin_memory: true

# ============== 模型配置 ==============
model:
  # 模型类型：'lstm', 'bilstm'
  type: lstm

  # LSTM 隐藏层维度
  hidden_dim: 64

  # LSTM 层数
  num_layers: 2

  # 输出维度（预测流量通常为 1）
  output_dim: 1

  # Dropout 比率
  dropout: 0.1

# ============== 训练配置 ==============
training:
  # 训练轮数
  num_epochs: 50

  # 学习率
  learning_rate: 0.001

  # 权重衰减（L2 正则化）
  weight_decay: 0.00001

  # 梯度裁剪范数（0 = 不裁剪）
  grad_clip: 1.0

  # 早停耐心值（验证损失不下降的 epoch 数后停止）
  early_stopping_patience: 10

# ============== 可视化配置 ==============
visualization:
  # 是否启用绘图
  enabled: true

  # 绘图风格：'hess', 'nature', 'jgr', 'dark_pro', 'warm_climate', 'eco_green', 'nature_pub'
  style: hess

  # 要生成的图表：'loss', 'scatter', 'timeseries', 'metrics'
  # 设置为空列表 [] 可禁用所有图表
  plots:
    - loss          # 训练/验证损失曲线
    - scatter       # 预测值 vs 观测值散点图
    - timeseries    # 时间序列对比图
    - metrics       # 指标汇总柱状图